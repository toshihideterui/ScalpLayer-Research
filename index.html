<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScalpLayer Research v9</title>
  <style>
    :root{--bg:#08111f;--panel:#101b2c;--panel2:#0b1423;--line:#26364d;--text:#edf4ff;--muted:#a7b7d2;--gold:#d7b34c;--green:#39d889;--red:#ff6470;--yellow:#f6c951}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.55}
    header,main{max-width:1240px;margin:0 auto;padding:22px 16px}
    h1{margin:0;font-size:clamp(25px,4vw,40px)}
    h2{margin:0 0 12px;font-size:18px}
    .sub,.note{color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
    .card{grid-column:span 12;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:10px;padding:16px}
    .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    input[type=file]{max-width:100%;color:var(--muted)}
    input[type=number]{width:88px;background:#07101d;border:1px solid var(--line);border-radius:8px;color:var(--text);padding:9px}
    button{background:var(--gold);border:0;border-radius:8px;color:#111;font-weight:800;padding:10px 14px;cursor:pointer}
    button:disabled{opacity:.45;cursor:not-allowed}
    .progress{height:10px;background:#07101d;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin-top:10px}
    .bar{height:100%;width:0;background:var(--gold)}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .metric{background:#081323;border:1px solid var(--line);border-radius:8px;padding:10px}
    .label{font-size:12px;color:var(--muted)}
    .value{font-weight:800;font-size:19px}
    .tablewrap{overflow:auto;border:1px solid var(--line);border-radius:8px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th,td{border-bottom:1px solid var(--line);padding:8px 7px;text-align:right;white-space:nowrap}
    th:first-child,td:first-child,th:nth-child(2),td:nth-child(2),th:nth-child(3),td:nth-child(3){text-align:left}
    th{background:#0a1626;color:#fff;position:sticky;top:0}
    .good{color:var(--green);font-weight:800}.bad{color:var(--red);font-weight:800}.warn{color:var(--yellow);font-weight:800}
    details{border:1px solid var(--line);border-radius:8px;padding:10px;background:#07101d}
    summary{cursor:pointer;font-weight:800}
    pre{white-space:pre-wrap;max-height:280px;overflow:auto;background:#07101d;border:1px solid var(--line);border-radius:8px;padding:12px;color:#cfe0ff}
    @media(max-width:760px){.summary{grid-template-columns:repeat(2,1fr)}.controls>*{width:100%}th,td{font-size:11px;padding:6px}}
  </style>
</head>
<body>
<header>
  <h1>ScalpLayer Research v9</h1>
  <p class="sub">USDJPY M1 3年分データから、日本時間の日中に動く Core Rule Day 候補を探索します。</p>
</header>
<main class="grid">
  <section class="card">
    <h2>1. CSV読み込み</h2>
    <p class="note">入力は USDJPY M1 CSV のみ。複数CSV/結合CSVに対応します。</p>
    <div class="controls">
      <input id="csvFiles" type="file" accept=".csv,.txt" multiple>
      <label class="note">Spread控除 <input id="spreadInput" type="number" value="0.8" step="0.1"> pips</label>
      <button id="loadBtn" type="button">CSVを読み込む</button>
      <button id="runBtn" type="button" disabled>Research v9を実行</button>
      <button id="downloadBtn" type="button" disabled>research_v9_results.json</button>
    </div>
    <div class="progress"><div id="progressBar" class="bar"></div></div>
    <p id="status" class="note">CSVを選択してください。</p>
  </section>

  <section class="card"><h2>2. データ概要</h2><div id="summary" class="summary"></div></section>
  <section class="card"><h2>3. 日中BUY候補トップ10</h2><div id="buyTop" class="tablewrap"></div></section>
  <section class="card"><h2>4. 日中SELL候補トップ10</h2><div id="sellTop" class="tablewrap"></div></section>
  <section class="card"><h2>5. BUY/SELL両対応候補トップ10</h2><div id="bothTop" class="tablewrap"></div></section>
  <section class="card"><h2>6. 実運用向き候補トップ5</h2><div id="practicalTop" class="tablewrap"></div></section>
  <section class="card"><h2>7. 却下すべき危険条件</h2><div id="dangerTop" class="tablewrap"></div></section>
  <section class="card"><h2>8. 年別成績</h2><div id="yearly" class="tablewrap"></div></section>
  <section class="card">
    <h2>Debug Console</h2>
    <pre id="debugLog">未実行</pre>
  </section>
</main>

<script>
const PIP = 100;
const RSI_PERIOD = 14;
const MAX_HOLD_LONG = 180;
const TIME_WINDOWS = [
  {id:"0900_1100", label:"09:00-11:00", start:9, end:11},
  {id:"0900_1200", label:"09:00-12:00", start:9, end:12},
  {id:"1000_1200", label:"10:00-12:00", start:10, end:12},
  {id:"1200_1500", label:"12:00-15:00", start:12, end:15},
  {id:"1500_1800", label:"15:00-18:00", start:15, end:18},
  {id:"1800_2100", label:"18:00-21:00", start:18, end:21},
  {id:"0900_1500", label:"09:00-15:00", start:9, end:15},
  {id:"0900_1800", label:"09:00-18:00", start:9, end:18}
];
const BUY_RSI = [20,25,30,35,40];
const SELL_RSI = [60,65,70,75,80];
const DROPS = [-4,-6,-8,-10];
const RISES = [4,6,8,10];
const BOOLS = [true,false];
const EXITS = [
  {id:"trail_10_5_180", label:"+10到達後-5戻し", type:"trail", start:10, back:5, max:180},
  {id:"tp10_sl15_180", label:"TP10/SL15", type:"tpsl", tp:10, sl:15, max:180},
  {id:"tp8_sl12_180", label:"TP8/SL12", type:"tpsl", tp:8, sl:12, max:180},
  {id:"time_60", label:"最大保有60分", type:"time", max:60},
  {id:"time_180", label:"最大保有180分", type:"time", max:180}
];

let bars = [];
let results = null;
const debug = {files:0, loadedRows:0, validBars:0, rsiCount:0, candidates:0, errors:[], lastRun:"--"};

document.getElementById("loadBtn").addEventListener("click", loadCsvFiles);
document.getElementById("runBtn").addEventListener("click", runResearch);
document.getElementById("downloadBtn").addEventListener("click", downloadJson);

function setStatus(text, bad=false){const el=document.getElementById("status");el.textContent=text;el.className=bad?"bad":"note"}
function setProgress(done,total){document.getElementById("progressBar").style.width=(total?Math.min(100,Math.round(done/total*100)):0)+"%"}
const waitFrame=()=>new Promise(r=>setTimeout(r,0));

async function loadCsvFiles(){
  const files=[...document.getElementById("csvFiles").files];
  if(!files.length){setStatus("CSVファイルを選択してください。",true);return}
  reset();
  try{
    const merged=[];
    for(let i=0;i<files.length;i++){
      setStatus(`CSV読み込み中 ${i+1}/${files.length}: ${files[i].name}`);
      setProgress(i,files.length);
      const parsed=parseCsvBars(await files[i].text(), files[i].name);
      debug.loadedRows += parsed.loadedRows;
      for(const e of parsed.errors) debug.errors.push(e);
      for(const b of parsed.bars) merged.push(b);
      await waitFrame();
    }
    bars=dedupeAndSortBars(merged);
    debug.files=files.length;
    debug.validBars=bars.length;
    enrichBars(bars);
    renderSummary();
    updateDebug();
    setProgress(100,100);
    document.getElementById("runBtn").disabled=!bars.length;
    setStatus("CSV読み込み完了。Research v9を実行できます。");
  }catch(error){
    debug.errors.push({scope:"loadCsvFiles",message:error.message});
    updateDebug();
    setStatus("CSV読み込み失敗: "+error.message,true);
  }
}

async function runResearch(){
  if(!bars.length){setStatus("先にCSVを読み込んでください。",true);return}
  document.getElementById("runBtn").disabled=true;
  document.getElementById("downloadBtn").disabled=true;
  try{
    const spread=Number(document.getElementById("spreadInput").value)||0;
    const buyAgg=new Map(), sellAgg=new Map();
    setStatus("出口pipsを事前計算中...");
    for(let i=30;i<bars.length-MAX_HOLD_LONG-1;i++){
      if(i%8000===0){setProgress(i,bars.length);setStatus(`分析中 ${i.toLocaleString()} / ${bars.length.toLocaleString()}`);await waitFrame()}
      const b=bars[i];
      if(!validFeatureBar(b)) continue;
      const timeHits=TIME_WINDOWS.filter(w=>isJstRange(b.time,w.start,w.end));
      if(!timeHits.length) continue;
      const exitCache={};
      for(const ex of EXITS){
        exitCache[`BUY|${ex.id}`]=simulateExit(bars,i,"BUY",ex,spread);
        exitCache[`SELL|${ex.id}`]=simulateExit(bars,i,"SELL",ex,spread);
      }
      const buyRsi=BUY_RSI.filter(v=>b.rsi<v);
      const buyDrop=DROPS.filter(v=>b.recent3<=v);
      const sellRsi=SELL_RSI.filter(v=>b.rsi>v);
      const sellRise=RISES.filter(v=>b.recent3>=v);
      for(const w of timeHits){
        for(const ex of EXITS){
          const bp=exitCache[`BUY|${ex.id}`];
          if(bp){
            for(const rsi of buyRsi) for(const drop of buyDrop){
              const key=buyKey(w,rsi,drop,b.lowUpdate3,ex);
              addTrade(buyAgg,key,bp,b.time);
            }
          }
          const sp=exitCache[`SELL|${ex.id}`];
          if(sp){
            for(const rsi of sellRsi) for(const rise of sellRise){
              const key=sellKey(w,rsi,rise,b.highUpdate3,ex);
              addTrade(sellAgg,key,sp,b.time);
            }
          }
        }
      }
    }
    const buyRows=finalizeAgg(buyAgg,"BUY");
    const sellRows=finalizeAgg(sellAgg,"SELL");
    const buyTop=rankCandidates(buyRows).slice(0,10);
    const sellTop=rankCandidates(sellRows).slice(0,10);
    const bothTop=buildBothCandidates(buyTop,sellTop).slice(0,10);
    const practical=rankCandidates([...buyRows,...sellRows].filter(isPractical)).slice(0,5);
    const danger=rankDanger([...buyRows,...sellRows]).slice(0,20);
    const yearly=buildYearlyRows([...buyTop,...sellTop,...practical]);
    results={
      meta:{version:"research-v9",generatedAt:new Date().toISOString(),sourceFiles:[...document.getElementById("csvFiles").files].map(f=>f.name),validBars:bars.length,startTime:bars[0]?fmtDate(bars[0].time):null,endTime:bars.at(-1)?fmtDate(bars.at(-1).time):null,spreadPips:spread},
      searchSpace:{timeWindows:TIME_WINDOWS,buyRsi:BUY_RSI,sellRsi:SELL_RSI,recentDrop:DROPS,recentRise:RISES,lowUpdate:BOOLS,highUpdate:BOOLS,exits:EXITS},
      topBuy:buyTop,topSell:sellTop,topBoth:bothTop,practicalTop5:practical,dangerConditions:danger,yearlyResults:yearly
    };
    renderTable("buyTop",buyTop);
    renderTable("sellTop",sellTop);
    renderTable("bothTop",bothTop);
    renderTable("practicalTop",practical);
    renderTable("dangerTop",danger);
    renderYearly(yearly);
    debug.candidates=buyRows.length+sellRows.length;
    debug.lastRun=fmtDate(new Date());
    updateDebug();
    document.getElementById("downloadBtn").disabled=false;
    setProgress(100,100);
    setStatus("Research v9分析完了。");
  }catch(error){
    debug.errors.push({scope:"runResearch",message:error.message});
    updateDebug();
    setStatus("分析失敗: "+error.message,true);
  }finally{
    document.getElementById("runBtn").disabled=false;
  }
}

function buyKey(w,rsi,drop,low,ex){return JSON.stringify({direction:"BUY",time:w.label,rsi:`RSI<${rsi}`,move:`Drop<=${drop}`,update:`LowUpdate=${low}`,exit:ex.label})}
function sellKey(w,rsi,rise,high,ex){return JSON.stringify({direction:"SELL",time:w.label,rsi:`RSI>${rsi}`,move:`Rise>=${rise}`,update:`HighUpdate=${high}`,exit:ex.label})}
function addTrade(map,key,pips,time){
  let a=map.get(key); if(!a){a={key,trades:[],years:new Map()}; map.set(key,a)}
  a.trades.push(pips);
  const y=time.getFullYear();
  let ya=a.years.get(y); if(!ya){ya=[]; a.years.set(y,ya)}
  ya.push(pips);
}
function finalizeAgg(map, direction){
  const rows=[];
  for(const a of map.values()){
    const info=JSON.parse(a.key);
    const m=calcMetrics(a.trades);
    const yearStats={};
    for(const y of [2023,2024,2025,2026]) yearStats[y]=calcMetrics(a.years.get(y)||[]);
    rows.push({...info,direction,...m,annualTrades:annualTrades(m.count),yearStats,yearPfMin:minYearPf(yearStats),rejectReason:rejectReason(m,yearStats),_trades:a.trades});
  }
  return rows;
}
function rankCandidates(rows){
  return rows
    .filter(r=>r.count>=30 && r.expectancy>0 && r.profitFactor>1)
    .sort((a,b)=>score(b)-score(a));
}
function score(r){
  const stable = r.yearPfMin>1 ? 30 : -60;
  return r.expectancy*25 + Math.min(r.profitFactor,10)*18 + Math.log(Math.max(1,r.count))*12 + stable - r.maxDrawdown*0.08;
}
function isPractical(r){return r.profitFactor>1.3 && r.expectancy>0 && r.annualTrades>=100 && r.yearPfMin>1 && r.count>=250}
function rankDanger(rows){
  return rows.filter(r=>r.count>=100).sort((a,b)=>(a.expectancy-b.expectancy)||(a.profitFactor-b.profitFactor));
}
function buildBothCandidates(buys,sells){
  const pairs=[];
  for(const b of buys.slice(0,10)){
    for(const s of sells.slice(0,10)){
      if(b.time!==s.time) continue;
      const trades=[...(b._trades||[]),...(s._trades||[])];
      const m=calcMetrics(trades);
      pairs.push({direction:"BUY/SELL",time:b.time,rsi:`BUY ${b.rsi} / SELL ${s.rsi}`,move:`${b.move} / ${s.move}`,update:`${b.update} / ${s.update}`,exit:`BUY ${b.exit} / SELL ${s.exit}`,...m,annualTrades:annualTrades(m.count),yearPfMin:Math.min(b.yearPfMin,s.yearPfMin),rejectReason:"上位BUY/SELLの合成候補"});
    }
  }
  return pairs.sort((a,b)=>score(b)-score(a));
}
function buildYearlyRows(rows){
  const out=[];
  const seen=new Set();
  for(const r of rows){
    const id=[r.direction,r.time,r.rsi,r.move,r.update,r.exit].join("|");
    if(seen.has(id)) continue; seen.add(id);
    for(const y of [2023,2024,2025,2026]){
      const m=r.yearStats?.[y]; if(!m) continue;
      out.push({candidate:id,year:y,count:m.count,winRate:m.winRate,profitFactor:m.profitFactor,expectancy:m.expectancy,totalPips:m.totalPips,maxDrawdown:m.maxDrawdown});
    }
  }
  return out;
}
function minYearPf(yearStats){
  const vals=[2023,2024,2025].map(y=>yearStats[y]).filter(m=>m&&m.count>=10).map(m=>m.profitFactor);
  return vals.length ? Math.min(...vals) : 0;
}
function rejectReason(m,ys){
  if(m.profitFactor<=1.3) return "3年合計PF<=1.3";
  if(m.expectancy<=0) return "期待値マイナス";
  if(annualTrades(m.count)<100) return "年間100回未満";
  if(minYearPf(ys)<=1) return "各年PF>1未達";
  return "";
}
function annualTrades(count){
  const years=bars.length&&bars[0]&&bars.at(-1)?(bars.at(-1).time-bars[0].time)/(365.25*24*3600*1000):3;
  return years>0?count/years:0;
}

function simulateExit(data,i,dir,ex,spread){
  const entry=data[i]?.close; if(!Number.isFinite(entry)) return null;
  const sign=dir==="BUY"?1:-1;
  let best=entry, worst=entry;
  const max=Math.min(data.length-1,i+(ex.max||180));
  for(let j=i+1;j<=max;j++){
    const b=data[j]; if(!validBar(b)) continue;
    if(dir==="BUY"){ if(b.high>best) best=b.high; if(b.low<worst) worst=b.low; }
    else { if(b.low<best) best=b.low; if(b.high>worst) worst=b.high; }
    const favorable=Math.abs(best-entry)*PIP;
    const adverse=Math.abs(worst-entry)*PIP;
    if(ex.type==="trail" && favorable>=ex.start && adverseFromBest(dir,b,best)>=ex.back){
      if(dir==="BUY"){
        const exitPrice=best-ex.back/PIP;
        return (exitPrice-entry)*PIP-spread;
      }
      const exitPrice=best+ex.back/PIP;
      return (entry-exitPrice)*PIP-spread;
    }
    if(ex.type==="tpsl"){
      if(favorable>=ex.tp) return ex.tp-spread;
      if(adverse>=ex.sl) return -ex.sl-spread;
    }
  }
  const last=data[max];
  return last ? ((last.close-entry)*PIP*sign - spread) : null;
}
function adverseFromBest(dir,b,best){return dir==="BUY"?(best-b.low)*PIP:(b.high-best)*PIP}

function enrichBars(data){
  let gains=0,losses=0;
  for(let i=1;i<data.length;i++){
    const diff=data[i].close-data[i-1].close;
    if(i<=RSI_PERIOD){if(diff>=0)gains+=diff;else losses-=diff}
    if(i===RSI_PERIOD){data[i].avgGain=gains/RSI_PERIOD;data[i].avgLoss=losses/RSI_PERIOD;data[i].rsi=rsiFrom(data[i].avgGain,data[i].avgLoss);debug.rsiCount++}
    else if(i>RSI_PERIOD){const g=Math.max(diff,0),l=Math.max(-diff,0);data[i].avgGain=(data[i-1].avgGain*(RSI_PERIOD-1)+g)/RSI_PERIOD;data[i].avgLoss=(data[i-1].avgLoss*(RSI_PERIOD-1)+l)/RSI_PERIOD;data[i].rsi=rsiFrom(data[i].avgGain,data[i].avgLoss);debug.rsiCount++}
    if(i>=3){data[i].recent3=(data[i].close-data[i-3].close)*PIP;data[i].lowUpdate3=data[i].low<=Math.min(data[i-1].low,data[i-2].low,data[i-3].low);data[i].highUpdate3=data[i].high>=Math.max(data[i-1].high,data[i-2].high,data[i-3].high)}
  }
}
function rsiFrom(g,l){if(l===0)return 100;const rs=g/l;return 100-100/(1+rs)}
function calcMetrics(values){
  const count=values.length,w=values.filter(v=>v>0),l=values.filter(v=>v<0),gp=sum(w),gl=Math.abs(sum(l)),total=sum(values);
  return {count,winRate:count?w.length/count*100:0,profitFactor:gl>0?gp/gl:(gp>0?999:0),expectancy:count?total/count:0,totalPips:total,maxDrawdown:maxDrawdown(values)}
}
function maxDrawdown(values){let e=0,p=0,d=0;for(const v of values){e+=v;if(e>p)p=e;d=Math.max(d,p-e)}return d}
function sum(a){return a.reduce((x,y)=>x+y,0)}

function parseCsvBars(text,fileName){
  const rows=parseCsv(text).filter(r=>r.some(c=>String(c).trim()!=="")); if(!rows.length)return{bars:[],loadedRows:0,errors:[]};
  const header=rows[0].map(h=>String(h).trim().toLowerCase()),idx=detectColumns(header),start=idx.hasHeader?1:0,out=[],errors=[];
  for(let r=start;r<rows.length;r++){const row=rows[r],b={sourceFile:fileName,sourceIndex:r+1,time:parseDate(row[idx.time]),open:toNumber(row[idx.open]),high:toNumber(row[idx.high]),low:toNumber(row[idx.low]),close:toNumber(row[idx.close])}; if(validBar(b))out.push(b); else if(errors.length<20)errors.push({fileName,row:r+1,message:"invalid row"})}
  return{bars:out,loadedRows:Math.max(0,rows.length-start),errors}
}
function detectColumns(header){
  const hasHeader=header.some(h=>/(time|date|datetime|日時|日付)/i.test(h)); if(!hasHeader)return{hasHeader:false,time:0,open:1,high:2,low:3,close:4};
  const find=ps=>header.findIndex(h=>ps.some(p=>p.test(h))); const idx={hasHeader:true,time:find([/datetime/,/time/,/date/,/日時/,/日付/]),open:find([/^open$/,/始値/]),high:find([/^high$/,/高値/]),low:find([/^low$/,/安値/]),close:find([/^close$/,/終値/])};
  for(const k of["time","open","high","low","close"])if(idx[k]<0)idx[k]={time:0,open:1,high:2,low:3,close:4}[k]; return idx
}
function parseCsv(text){const rows=[];let row=[],cell="",q=false;for(let i=0;i<text.length;i++){const ch=text[i],n=text[i+1];if(q&&ch==='"'&&n==='"'){cell+='"';i++;continue}if(ch==='"'){q=!q;continue}if(!q&&ch===","){row.push(cell);cell="";continue}if(!q&&(ch==="\n"||ch==="\r")){if(ch==="\r"&&n==="\n")i++;row.push(cell);rows.push(row);row=[];cell="";continue}cell+=ch}row.push(cell);rows.push(row);return rows}
function parseDate(v){const raw=String(v||"").trim();if(!raw)return null;const s=raw.replace(/\./g,"-").replace(/\//g,"-").replace("T"," ");const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);if(m){const[,y,mo,d,h="0",mi="0",sec="0"]=m;return new Date(+y,+mo-1,+d,+h,+mi,+sec)}const d=new Date(raw);return Number.isNaN(d.getTime())?null:d}
function toNumber(v){const n=Number(String(v??"").trim().replace(/,/g,""));return Number.isFinite(n)?n:NaN}
function validBar(b){return b&&b.time instanceof Date&&!Number.isNaN(b.time.getTime())&&[b.open,b.high,b.low,b.close].every(Number.isFinite)}
function validFeatureBar(b){return validBar(b)&&Number.isFinite(b.rsi)&&Number.isFinite(b.recent3)}
function dedupeAndSortBars(data){const m=new Map();for(const b of data)m.set(b.time.getTime(),b);return[...m.values()].sort((a,b)=>a.time-b.time)}
function isJstRange(d,s,e){const h=d.getHours();return s<e?h>=s&&h<e:h>=s||h<e}

function renderSummary(){document.getElementById("summary").innerHTML=[metric("ファイル数",debug.files),metric("読み込み行数",debug.loadedRows.toLocaleString()),metric("有効バー数",bars.length.toLocaleString()),metric("開始日時",bars[0]?fmtDate(bars[0].time):"--"),metric("終了日時",bars.at(-1)?fmtDate(bars.at(-1).time):"--"),metric("対象年",collectYears(bars).join(", ")||"--"),metric("Spread控除",(Number(document.getElementById("spreadInput").value)||0).toFixed(1)+"pips"),metric("RSI計算件数",debug.rsiCount.toLocaleString())].join("")}
function metric(l,v){return`<div class="metric"><div class="label">${esc(l)}</div><div class="value">${esc(String(v))}</div></div>`}
function renderTable(id,rows){document.getElementById(id).innerHTML=tableHtml(rows)}
function tableHtml(rows){if(!rows.length)return`<p class="note">該当なし</p>`;return`<table><thead><tr><th>方向</th><th>時間</th><th>条件</th><th>Exit</th><th>件数</th><th>年回数</th><th>勝率</th><th>PF</th><th>期待値</th><th>総pips</th><th>最大DD</th><th>年PF最小</th><th>判定</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.direction)}</td><td>${esc(r.time)}</td><td>${esc([r.rsi,r.move,r.update].join(" / "))}</td><td>${esc(r.exit)}</td><td>${fmtInt(r.count)}</td><td>${fmt(r.annualTrades)}</td><td class="${r.winRate>=70?"good":r.winRate>=55?"warn":"bad"}">${fmt(r.winRate)}%</td><td class="${r.profitFactor>=1.3?"good":r.profitFactor>=1?"warn":"bad"}">${fmtPf(r.profitFactor)}</td><td class="${r.expectancy>0?"good":"bad"}">${sign(r.expectancy)}</td><td class="${r.totalPips>0?"good":"bad"}">${sign(r.totalPips)}</td><td>${fmt(r.maxDrawdown)}</td><td class="${r.yearPfMin>1?"good":"bad"}">${fmtPf(r.yearPfMin)}</td><td>${esc(r.rejectReason||"候補")}</td></tr>`).join("")}</tbody></table>`}
function renderYearly(rows){if(!rows.length){document.getElementById("yearly").innerHTML=`<p class="note">該当なし</p>`;return}document.getElementById("yearly").innerHTML=`<table><thead><tr><th>候補</th><th>年</th><th>件数</th><th>勝率</th><th>PF</th><th>期待値</th><th>総pips</th><th>最大DD</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.candidate)}</td><td>${r.year}</td><td>${fmtInt(r.count)}</td><td>${fmt(r.winRate)}%</td><td>${fmtPf(r.profitFactor)}</td><td>${sign(r.expectancy)}</td><td>${sign(r.totalPips)}</td><td>${fmt(r.maxDrawdown)}</td></tr>`).join("")}</tbody></table>`}
function updateDebug(){document.getElementById("debugLog").textContent=[`ファイル数: ${debug.files}`,`読み込み行数: ${debug.loadedRows}`,`有効バー数: ${debug.validBars}`,`RSI計算件数: ${debug.rsiCount}`,`候補数: ${debug.candidates}`,`最終実行: ${debug.lastRun}`,"","Errors:",...(debug.errors.length?debug.errors.slice(-40).map(e=>JSON.stringify(e)):["なし"])].join("\n")}
function reset(){bars=[];results=null;Object.assign(debug,{files:0,loadedRows:0,validBars:0,rsiCount:0,candidates:0,errors:[],lastRun:"--"});for(const id of["summary","buyTop","sellTop","bothTop","practicalTop","dangerTop","yearly"])document.getElementById(id).innerHTML="";document.getElementById("downloadBtn").disabled=true;setProgress(0,100);updateDebug()}
function downloadJson(){if(!results)return;const blob=new Blob([JSON.stringify(results,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="research_v9_results.json";a.click();URL.revokeObjectURL(url)}
function collectYears(data){const s=new Set();for(const b of data)if(b?.time)s.add(b.time.getFullYear());return[...s].sort((a,b)=>a-b)}
function fmtDate(d){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`}
function pad(n){return String(n).padStart(2,"0")}function fmt(n){return Number.isFinite(n)?n.toFixed(2):"--"}function fmtPf(n){return n>=999?"∞":fmt(n)}function sign(n){return Number.isFinite(n)?(n>=0?"+":"")+n.toFixed(2):"--"}function fmtInt(n){return Number(n||0).toLocaleString()}function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
updateDebug();
</script>
