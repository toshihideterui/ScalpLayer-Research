<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScalpLayer USDJPY Research v17</title>
  <style>
    :root{--bg:#08111f;--panel:#101b2c;--panel2:#0b1423;--line:#26364d;--text:#edf4ff;--muted:#a7b7d2;--gold:#d7b34c;--green:#39d889;--red:#ff6470;--yellow:#f6c951}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.55}
    header,main{max-width:1320px;margin:0 auto;padding:22px 16px}h1{margin:0;font-size:clamp(25px,4vw,40px)}h2{margin:0 0 12px;font-size:18px}
    .sub,.note{color:var(--muted);font-size:13px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
    .card{grid-column:span 12;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:10px;padding:16px}
    .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center}input[type=file]{max-width:100%;color:var(--muted)}
    button{background:var(--gold);border:0;border-radius:8px;color:#111;font-weight:800;padding:10px 14px;cursor:pointer}button:disabled{opacity:.45;cursor:not-allowed}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{background:#081323;border:1px solid var(--line);border-radius:8px;padding:10px}.label{font-size:12px;color:var(--muted)}.value{font-weight:800;font-size:19px}
    .tablewrap{overflow:auto;border:1px solid var(--line);border-radius:8px}table{width:100%;border-collapse:collapse;font-size:12px}
    th,td{border-bottom:1px solid var(--line);padding:8px 7px;text-align:right;white-space:nowrap}th:first-child,td:first-child,th:nth-child(2),td:nth-child(2),th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4){text-align:left}
    th{background:#0a1626;color:#fff;position:sticky;top:0}tr.ea{background:rgba(57,216,137,.10)}tr.watch{background:rgba(246,201,81,.08)}tr.reject{background:rgba(255,100,112,.07)}
    .good{color:var(--green);font-weight:800}.bad{color:var(--red);font-weight:800}.warn{color:var(--yellow);font-weight:800}
    pre{white-space:pre-wrap;max-height:300px;overflow:auto;background:#07101d;border:1px solid var(--line);border-radius:8px;padding:12px;color:#cfe0ff}
    @media(max-width:760px){.summary{grid-template-columns:repeat(2,1fr)}.controls>*{width:100%}th,td{font-size:11px;padding:6px}}
  </style>
</head>
<body>
<header>
  <h1>ScalpLayer USDJPY Research v17</h1>
  <p class="sub">research_v16_results.json から、2026年相場でも生き残っている第2Core候補を抽出します。</p>
</header>

<main class="grid">
  <section class="card">
    <h2>1. research_v16_results.json 読み込み</h2>
    <div class="controls">
      <input id="jsonFile" type="file" accept=".json">
      <button id="loadBtn" type="button">JSONを読み込む</button>
      <button id="downloadBtn" type="button" disabled>research_v17_results.json</button>
    </div>
    <p id="status" class="note">research_v16_results.json を選択してください。</p>
  </section>

  <section class="card"><h2>2. 概要</h2><div id="summary" class="summary"></div></section>
  <section class="card"><h2>3. 2026年 PF順 上位20件</h2><div id="top20" class="tablewrap"></div></section>
  <section class="card"><h2>4. 指定ルール A / B 詳細</h2><div id="abDetail" class="tablewrap"></div></section>
  <section class="card"><h2>5. 月別成績</h2><div id="monthly" class="tablewrap"></div></section>
  <section class="card"><h2>6. 最終評価</h2><div id="judgement" class="tablewrap"></div></section>
  <section class="card"><h2>Debug Console</h2><pre id="debugLog">未実行</pre></section>
</main>

<script>
let source = null;
let results = null;
const debug = { errors: [], loaded: false, candidateCount: 0, filteredCount: 0 };

document.getElementById("loadBtn").addEventListener("click", loadJson);
document.getElementById("downloadBtn").addEventListener("click", downloadJson);

async function loadJson(){
  const file = document.getElementById("jsonFile").files[0];
  if(!file){setStatus("research_v16_results.json を選択してください。", true);return;}
  try{
    source = JSON.parse(await file.text());
    results = analyze(source, file.name);
    renderAll(results);
    document.getElementById("downloadBtn").disabled = false;
    setStatus("Research v17分析完了。");
  }catch(e){
    debug.errors.push({scope:"loadJson",message:e.message,stack:e.stack});
    updateDebug();
    setStatus("JSON読み込み失敗: "+e.message, true);
  }
}

function analyze(data, fileName){
  const candidates = collectCandidates(data);
  debug.loaded = true;
  debug.candidateCount = candidates.length;
  const enriched = candidates.map((r, i) => enrichCandidate(r, i + 1));
  const filtered = enriched
    .filter(r => r.y2026.count >= 30 && r.y2026.profitFactor >= 1.5 && r.y2026.expectancy > 0)
    .sort((a,b) => b.y2026.profitFactor - a.y2026.profitFactor)
    .slice(0,20)
    .map((r,i)=>({...r, rank:i+1}));
  debug.filteredCount = filtered.length;
  const ruleA = findRule(enriched, { name:"A", move:"Recent3Rise>=4" });
  const ruleB = findRule(enriched, { name:"B", move:"Recent3Rise>=6" });
  const ab = [ruleA, ruleB].filter(Boolean);
  const monthly = buildMonthlyRows(ab);
  const finalJudgement = buildFinalJudgement(filtered, ab);
  return {
    meta: {
      version: "research-v17",
      generatedAt: new Date().toISOString(),
      sourceFileName: fileName,
      sourceVersion: data?.meta?.version || "",
      note: "v16 JSONに月別トレード明細がない場合、月別成績・最大連勝・最大連敗は未計算として表示します。"
    },
    criteria: { year: 2026, minPf: 1.5, minCount: 30, minExpectancy: 0 },
    top20By2026Pf: filtered,
    ruleDetails: ab,
    monthlyStats: monthly,
    finalJudgement
  };
}

function collectCandidates(data){
  const pools = [
    data?.ranking,
    data?.top3Candidates,
    data?.priorityACandidates,
    data?.priorityBCandidates,
    data?.superCandidates,
    data?.mainCandidates
  ].filter(Array.isArray);
  const map = new Map();
  for(const pool of pools){
    for(const r of pool){
      const key = JSON.stringify([r.timeWindow,r.direction,r.rsi,r.move,r.update,r.bb,r.ema,r.atr,r.vol,r.exit]);
      if(!map.has(key)) map.set(key, r);
    }
  }
  return [...map.values()];
}

function enrichCandidate(r, sourceRank){
  const y2026 = normalizeMetrics(r?.yearStats?.[2026]);
  return {
    sourceRank,
    ruleName: r.ruleName || "",
    timeWindow: r.timeWindow || "",
    direction: r.direction || "",
    conditions: [r.rsi,r.move,r.update,r.bb,r.ema,r.atr,r.vol,r.exit].filter(Boolean).join(" / "),
    rsi: r.rsi, move: r.move, update: r.update, bb: r.bb, ema: r.ema, atr: r.atr, vol: r.vol, exit: r.exit,
    allPeriod: normalizeMetrics(r),
    y2026,
    maxWinStreak2026: streakUnavailable(r),
    maxLossStreak2026: streakUnavailable(r),
    maxDrawdown2026: y2026.maxDrawdown,
    monthlyStats: Array.isArray(r.monthlyStats2026) ? r.monthlyStats2026 : [],
    judgement: judgeCandidate(y2026)
  };
}

function normalizeMetrics(m){
  return {
    count: Number(m?.count || 0),
    winRate: Number(m?.winRate || 0),
    profitFactor: Number(m?.profitFactor || 0),
    totalPips: Number(m?.totalPips || 0),
    expectancy: Number(m?.expectancy || 0),
    maxDrawdown: Number(m?.maxDrawdown || 0)
  };
}

function streakUnavailable(){ return "v16 JSONに取引順序明細なし"; }

function judgeCandidate(m){
  if(m.count >= 50 && m.profitFactor >= 2.0 && m.expectancy >= 2) return { label:"EA候補", className:"ea", reason:"2026年でもPF2.0以上、期待値+2以上、件数50以上" };
  if(m.count >= 30 && m.profitFactor >= 1.5 && m.expectancy > 0) return { label:"要注意", className:"watch", reason:"抽出条件は満たすが、追加検証推奨" };
  return { label:"除外候補", className:"reject", reason:"2026年基準未達" };
}

function findRule(rows, spec){
  const matched = rows.filter(r =>
    r.timeWindow === "21:00-24:00" &&
    r.direction === "SELL" &&
    r.rsi === "RSI>60" &&
    r.move === spec.move &&
    r.bb === "MiddleUpper" &&
    r.atr === "ATR=High" &&
    r.vol === "Vol=High" &&
    r.exit === "180分決済"
  ).sort((a,b)=>b.y2026.profitFactor-a.y2026.profitFactor)[0];
  return matched ? { ...matched, ruleName: `Rule ${spec.name}` } : {
    ruleName: `Rule ${spec.name}`,
    timeWindow: "21:00-24:00",
    direction: "SELL",
    conditions: `RSI>60 / ${spec.move} / BB=MiddleUpper / ATR=High / Vol=High / 180分決済`,
    y2026: normalizeMetrics(null),
    allPeriod: normalizeMetrics(null),
    maxWinStreak2026: "該当候補なし",
    maxLossStreak2026: "該当候補なし",
    monthlyStats: [],
    judgement: { label:"除外候補", className:"reject", reason:"v16 JSON内に完全一致候補なし" }
  };
}

function buildMonthlyRows(rules){
  const rows = [];
  for(const r of rules){
    if(r.monthlyStats && r.monthlyStats.length){
      for(const m of r.monthlyStats) rows.push({ ruleName:r.ruleName, ...m });
    } else {
      for(let month=1;month<=12;month++){
        rows.push({ ruleName:r.ruleName, month:`2026-${String(month).padStart(2,"0")}`, count:"--", profitFactor:"--", totalPips:"--", expectancy:"--", note:"v16 JSONに月別明細なし" });
      }
    }
  }
  return rows;
}

function buildFinalJudgement(filtered, ab){
  const ea = filtered.filter(r => r.judgement.label === "EA候補");
  const watch = filtered.filter(r => r.judgement.label === "要注意");
  const best = filtered[0] || null;
  return {
    summary: ea.length ? "2026年でもEA候補あり" : watch.length ? "2026年では要注意候補のみ" : "2026年基準を満たす候補なし",
    bestCandidate: best,
    eaCandidates: ea.length,
    watchCandidates: watch.length,
    excludedNote: "過去全期間よりも2026年PF・件数・期待値を優先して評価しています。",
    ruleA: ab.find(r=>r.ruleName==="Rule A")?.judgement || null,
    ruleB: ab.find(r=>r.ruleName==="Rule B")?.judgement || null
  };
}

function renderAll(res){
  document.getElementById("summary").innerHTML = [
    metric("Source", res.meta.sourceFileName),
    metric("候補総数", debug.candidateCount),
    metric("2026抽出候補", debug.filteredCount),
    metric("最終判定", res.finalJudgement.summary)
  ].join("");
  renderTable("top20", res.top20By2026Pf);
  renderTable("abDetail", res.ruleDetails);
  renderMonthly(res.monthlyStats);
  renderJudgement(res.finalJudgement);
  updateDebug();
}

function renderTable(id, rows){
  if(!rows.length){document.getElementById(id).innerHTML = `<p class="note">該当候補なし</p>`;return;}
  document.getElementById(id).innerHTML = `<table><thead><tr><th>Rank</th><th>Rule</th><th>Time</th><th>Direction</th><th>Conditions</th><th>2026 Count</th><th>2026 WinRate</th><th>2026 PF</th><th>2026 Total</th><th>2026 Avg</th><th>2026 MaxDD</th><th>最大連勝</th><th>最大連敗</th><th>評価</th><th>理由</th></tr></thead><tbody>${rows.map(r=>`<tr class="${esc(r.judgement?.className||"reject")}"><td>${esc(r.rank||"")}</td><td>${esc(r.ruleName||"")}</td><td>${esc(r.timeWindow)}</td><td>${esc(r.direction)}</td><td>${esc(r.conditions)}</td><td>${fmtInt(r.y2026.count)}</td><td>${fmt(r.y2026.winRate)}%</td><td>${fmtPf(r.y2026.profitFactor)}</td><td>${sign(r.y2026.totalPips)}</td><td>${sign(r.y2026.expectancy)}</td><td>${fmt(r.y2026.maxDrawdown)}</td><td>${esc(r.maxWinStreak2026)}</td><td>${esc(r.maxLossStreak2026)}</td><td>${esc(r.judgement?.label)}</td><td>${esc(r.judgement?.reason)}</td></tr>`).join("")}</tbody></table>`;
}

function renderMonthly(rows){
  document.getElementById("monthly").innerHTML = `<table><thead><tr><th>Rule</th><th>Month</th><th>Count</th><th>PF</th><th>TotalPips</th><th>AvgPips</th><th>Note</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.ruleName)}</td><td>${esc(r.month)}</td><td>${esc(r.count)}</td><td>${esc(r.profitFactor)}</td><td>${esc(r.totalPips)}</td><td>${esc(r.expectancy)}</td><td>${esc(r.note||"")}</td></tr>`).join("")}</tbody></table>`;
}

function renderJudgement(j){
  document.getElementById("judgement").innerHTML = `<table><thead><tr><th>項目</th><th>内容</th></tr></thead><tbody>
    <tr><td>総括</td><td>${esc(j.summary)}</td></tr>
    <tr><td>EA候補数</td><td>${fmtInt(j.eaCandidates)}</td></tr>
    <tr><td>要注意候補数</td><td>${fmtInt(j.watchCandidates)}</td></tr>
    <tr><td>評価方針</td><td>${esc(j.excludedNote)}</td></tr>
    <tr><td>Best</td><td>${esc(j.bestCandidate ? `${j.bestCandidate.timeWindow} ${j.bestCandidate.direction} ${j.bestCandidate.conditions}` : "なし")}</td></tr>
  </tbody></table>`;
}

function metric(label,value){return`<div class="metric"><div class="label">${esc(label)}</div><div class="value">${esc(String(value))}</div></div>`;}
function setStatus(text,bad=false){const el=document.getElementById("status");el.textContent=text;el.className=bad?"bad":"note";}
function downloadJson(){if(!results)return;download("research_v17_results.json",JSON.stringify(results,null,2),"application/json");}
function download(name,text,type){const blob=new Blob([text],{type});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);}
function updateDebug(){document.getElementById("debugLog").textContent=[`loaded: ${debug.loaded}`,`candidateCount: ${debug.candidateCount}`,`filteredCount: ${debug.filteredCount}`,"","Errors:",...(debug.errors.length?debug.errors.slice(-40).map(e=>JSON.stringify(e)):["なし"])].join("\n");}
function fmt(n){return Number.isFinite(Number(n))?Number(n).toFixed(2):"--";}
function fmtPf(n){return Number(n)>=999?"∞":fmt(n);}
function sign(n){return Number.isFinite(Number(n))?(Number(n)>=0?"+":"")+Number(n).toFixed(2):"--";}
function fmtInt(n){return Number.isFinite(Number(n))?Number(n).toLocaleString():"--";}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
updateDebug();
</script>
</body>
</html>
